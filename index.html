<!DOCTYPE html>
<html>
<head>
  <title>Time Till We Close</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: #fff;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      overflow: hidden;
    }
    h1 { font-size: 3em; margin-bottom: 20px; text-shadow: 2px 2px 8px rgba(0,0,0,0.5); }
    #countdown { font-size: 4em; font-weight: bold; background: rgba(0,0,0,0.3); padding: 20px 40px; border-radius: 20px; text-shadow: 2px 2px 10px rgba(0,0,0,0.7); margin-bottom: 20px; }
    #question { font-size: 1.5em; margin-bottom: 15px; text-shadow: 1px 1px 5px rgba(0,0,0,0.5); }
    .buttons { display: flex; gap: 20px; margin-bottom: 20px; }
    button { padding: 15px 30px; font-size: 1.2em; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; color: #fff; transition:0.2s; }
    #yesBtn { background: #28a745; } #yesBtn:hover { background: #1e7e34; }
    #noBtn { background: #dc3545; } #noBtn:hover { background: #a71d2a; }
    canvas { position: absolute; top:0; left:0; pointer-events:none; }
    #game { margin-top:20px; text-align:center; }
    #reactBtn, #tryAgainBtn { padding:30px 60px; font-size:2em; border-radius:20px; cursor:pointer; transition:0.2s; margin:10px; display:inline-block; }
    #reactBtn { background:red; }
    #result { margin-bottom:15px; font-size:1.5em; }
  </style>
</head>
<body>
  <h1>Time Till We Close</h1>
  <div id="countdown">Loading...</div>

  <div id="question">Are you TZ?</div>
  <div class="buttons" id="tzButtons">
    <button id="yesBtn">Yes</button>
    <button id="noBtn">No</button>
  </div>

  <div id="game">
    <div id="result"></div>
    <button id="reactBtn">Wait...</button>
    <button id="tryAgainBtn" style="display:none;">Try Again</button>
  </div>

  <canvas id="confetti"></canvas>

<script>
  // Countdown
  const countdownEl = document.getElementById("countdown");
  const buttonsDiv = document.getElementById("tzButtons");
  const yesBtn = document.getElementById("yesBtn");
  const noBtn = document.getElementById("noBtn");
  const questionEl = document.getElementById("question");

  let target = new Date();
  const now = new Date();
  target.setDate(now.getDate() + ((4 - now.getDay() + 7) % 7));
  target.setHours(15,0,0,0);

  function updateCountdown(){
    let diff = target - new Date();
    if(diff <0){
      countdownEl.innerText="We've Closed!";
      buttonsDiv.style.display="none";
      questionEl.style.display="none";
      clearInterval(interval);
      startConfetti();
      return;
    }
    const days = Math.floor(diff / (1000*60*60*24));
    diff -= days*1000*60*60*24;
    const hours = Math.floor(diff / (1000*60*60));
    diff -= hours*1000*60*60;
    const minutes = Math.floor(diff / (1000*60));
    diff -= minutes*1000*60;
    const seconds = Math.floor(diff / 1000);
    countdownEl.innerText=`${days}d ${hours}h ${minutes}m ${seconds}s`;
  }

  updateCountdown();
  const interval = setInterval(updateCountdown,1000);

  function handleTZ(isTZ){
    if(isTZ) target.setDate(target.getDate()+1);
    buttonsDiv.style.display="none";
    questionEl.style.display="none";
    updateCountdown();
  }

  yesBtn.addEventListener("click", ()=>handleTZ(true));
  noBtn.addEventListener("click", ()=>handleTZ(false));

  // Confetti
  const confettiCanvas=document.getElementById("confetti");
  const ctx=confettiCanvas.getContext("2d");
  confettiCanvas.width=window.innerWidth;
  confettiCanvas.height=window.innerHeight;
  let confettis=[];
  function startConfetti(){
    for(let i=0;i<150;i++){
      confettis.push({x:Math.random()*window.innerWidth, y:Math.random()*window.innerHeight- window.innerHeight, r:Math.random()*6+4, d:Math.random()*30+10, color:`hsl(${Math.random()*360},100%,50%)`, tilt:Math.random()*10-10});
    }
    requestAnimationFrame(drawConfetti);
  }
  function drawConfetti(){
    ctx.clearRect(0,0,confettiCanvas.width,confettiCanvas.height);
    confettis.forEach((c,i)=>{
      ctx.beginPath();
      ctx.lineWidth=c.r/2;
      ctx.strokeStyle=c.color;
      ctx.moveTo(c.x+c.tilt,c.y);
      ctx.lineTo(c.x+c.tilt+c.r,c.y+c.tilt+c.r);
      ctx.stroke();
      c.y+=Math.cos(0.1+c.d)*2+1+c.r/2;
      c.x+=Math.sin(0.1)*2;
      if(c.y>window.innerHeight){ confettis[i].y=-10; confettis[i].x=Math.random()*window.innerWidth; }
    });
    requestAnimationFrame(drawConfetti);
  }
  window.addEventListener("resize",()=>{ confettiCanvas.width=window.innerWidth; confettiCanvas.height=window.innerHeight; });

  // Reaction game
  const reactBtn=document.getElementById("reactBtn");
  const tryAgainBtn=document.getElementById("tryAgainBtn");
  const result=document.getElementById("result");
  let startTime;
  let clickable=false;

  function startReaction(){
    reactBtn.style.background="red";
    reactBtn.innerText="Wait...";
    clickable=false;
    result.innerText="";
    tryAgainBtn.style.display="none";

    let delay = Math.random()*2000 + 1000; // 1-3 sec
    setTimeout(()=>{
      reactBtn.style.background="green";
      reactBtn.innerText="CLICK!";
      startTime=Date.now();
      clickable=true;
    }, delay);
  }

  reactBtn.addEventListener("click",()=>{
    if(clickable){
      let time=(Date.now()-startTime)/1000;
      result.innerText=`Your reaction: ${time.toFixed(3)}s`;
      clickable=false;
      tryAgainBtn.style.display="inline-block";
    } else {
      reactBtn.innerText="Too soon!";
      reactBtn.style.background="#800000"; // dark red
      tryAgainBtn.style.display="inline-block";
    }
  });

  tryAgainBtn.addEventListener("click", startReaction);

  startReaction();
</script>
</body>
</html>
